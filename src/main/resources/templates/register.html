<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Minesweeper Register</title>
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
    <div class="register-container">
        <img src="/img/smiley.png" alt="Smiley" class="emoji" style="width:64px;height:64px;margin-top:16px;">
        <h1>Register</h1>
        <div id="registerError" class="register-error" style="display:none;"></div>
        <form class="register-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <a class="login-link" th:href="@{/user-login}">Already have an account? Login here!</a>
    </div>
<script src="/js/register.js"></script>
</body>
</html>
